---
- name: Prepare
  hosts: all
  tasks:
    - name: Disable pacman internal sandbox
      become: true
      ansible.builtin.lineinfile:
        path: /etc/pacman.conf
        line: "DisableSandbox"
        insertafter: "^\\[options\\]"

    - name: Install prerequisites (curl, unzip)
      become: true
      community.general.pacman:
        name:
          - curl
          - unzip
        state: present
        update_cache: true

    - name: Create /etc/steamos-release to trigger Steam Deck detection
      become: true
      ansible.builtin.file:
        path: /etc/steamos-release
        state: touch
        mode: "0644"
