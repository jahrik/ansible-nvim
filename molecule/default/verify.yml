---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:

  - name: Check nvim binary
    ansible.builtin.command: which nvim
    register: nvim_bin
    changed_when: false
    failed_when: false

  - name: Assert nvim is installed
    ansible.builtin.assert:
      that: nvim_bin.rc == 0

  - name: Check fd binary
    ansible.builtin.command: which fdfind
    register: fdfind_bin
    changed_when: false
    failed_when: false

  - name: Check fd (alternative) binary
    ansible.builtin.command: which fd
    register: fd_bin
    changed_when: false
    failed_when: false

  - name: Assert fd is installed
    ansible.builtin.assert:
      that: fdfind_bin.rc == 0 or fd_bin.rc == 0

  - name: Check rg binary
    ansible.builtin.command: which rg
    register: rg_bin
    changed_when: false
    failed_when: false

  - name: Assert rg is installed
    ansible.builtin.assert:
      that: rg_bin.rc == 0

  - name: Check tree-sitter binary
    ansible.builtin.command: which tree-sitter
    register: treesitter_bin
    changed_when: false
    failed_when: false

  - name: Assert tree-sitter is installed
    ansible.builtin.assert:
      that: treesitter_bin.rc == 0

  - name: Stat ~/.config/nvim/init.lua file
    ansible.builtin.stat:
      path: ~/.config/nvim/init.lua
    register: init_lua

  - name: Assert ~/.config/nvim/init.lua exists
    ansible.builtin.assert:
      that: init_lua.stat.exists

  - name: Stat ~/.config/nvim/lua/core/lazy.lua file
    ansible.builtin.stat:
      path: ~/.config/nvim/lua/core/lazy.lua
    register: lazy_lua

  - name: Assert ~/.config/nvim/lua/core/lazy.lua exists
    ansible.builtin.assert:
      that: lazy_lua.stat.exists

  - name: Stat ~/.config/nvim/lua/plugins/lsp.lua file
    ansible.builtin.stat:
      path: ~/.config/nvim/lua/plugins/lsp.lua
    register: lsp_lua

  - name: Assert ~/.config/nvim/lua/plugins/lsp.lua exists
    ansible.builtin.assert:
      that: lsp_lua.stat.exists

  - name: Run nvim --version
    ansible.builtin.command: nvim --version
    register: nvim_version
    changed_when: false

  - name: Assert nvim version output
    ansible.builtin.assert:
      that: "'NVIM' in nvim_version.stdout"

  - name: Run fd --version
    ansible.builtin.shell: fd --version || fdfind --version
    register: fd_version
    changed_when: false

  - name: Assert fd version output
    ansible.builtin.assert:
      that: "'fd ' in fd_version.stdout"

  - name: Run rg --version
    ansible.builtin.command: rg --version
    register: rg_version
    changed_when: false

  - name: Assert rg version output
    ansible.builtin.assert:
      that: "'ripgrep ' in rg_version.stdout"

  - name: Run tree-sitter --version
    ansible.builtin.command: tree-sitter --version
    register: treesitter_version
    changed_when: false

  - name: Assert tree-sitter version output
    ansible.builtin.assert:
      that: "'tree-sitter ' in treesitter_version.stdout"

  - name: Verify core lua files parse without syntax errors
    become: false
    ansible.builtin.command: >
      nvim --headless -u NONE -c
      'lua local files={"core/options","core/keymaps","core/autocmds","core/lazy"};
      for _,f in ipairs(files) do
      local ok,err=loadfile(vim.fn.expand("~/.config/nvim/lua/"..f..".lua"));
      if not ok then io.write(err); vim.cmd("cq") end end;
      io.write("ok")' -c 'qa'
    register: nvim_lua_check
    changed_when: false

  - name: Assert core lua files have no syntax errors
    ansible.builtin.assert:
      that: "nvim_lua_check.stdout == 'ok'"

  - name: Run lazy.nvim plugin sync
    become: false
    ansible.builtin.shell: |
      timeout 120 nvim --headless "+Lazy! sync" "+sleep 90" "+qa" >/dev/null 2>&1
      nvim --headless -c 'lua io.write(tostring(#require("lazy").plugins()))' -c 'qa' 2>/dev/null
    register: lazy_sync
    changed_when: false

  - name: Assert lazy.nvim installed plugins
    ansible.builtin.assert:
      that: "lazy_sync.stdout | int > 30"
