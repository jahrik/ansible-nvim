---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check nvim binary
      ansible.builtin.command: which nvim
      changed_when: false
      register: nvim_bin

    - name: Assert nvim is installed
      ansible.builtin.assert:
        that: nvim_bin.rc == 0
        fail_msg: "nvim binary not found in PATH"

    - name: Stat ~/.config/nvim/init.lua
      ansible.builtin.stat:
        path: ~/.config/nvim/init.lua
      register: init_lua

    - name: Assert init.lua exists
      ansible.builtin.assert:
        that: init_lua.stat.exists
        fail_msg: "~/.config/nvim/init.lua not found"
