---
# Local macOS testing via Vagrant. Requires:
#   gem install vagrant
#   vagrant plugin install vagrant-parallels  (default; Parallels Desktop on Apple Silicon)
#   Change provider_name to vmware_desktop and install vagrant-vmware-desktop for Intel Macs
#
# Run with: molecule test -s vagrant
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: vagrant
  provider_name: parallels
platforms:
  - name: macos
    box: ramrod/macOS-ventura
    memory: 4096
    cpus: 2
provisioner:
  name: ansible
  inventory:
    host_vars:
      macos:
        ansible_user: vagrant
verifier:
  name: ansible
