---
- name: Install requirements
  become: true
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - fd-find
      - fontconfig
      - git
      - gpg
      - ripgrep
      - unzip
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Download neovim PPA signing key
  become: true
  ansible.builtin.get_url:
    url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x9DBB0BE9366964F134855E2255F96FCF8231B6DD"
    dest: /usr/share/keyrings/neovim-ppa.asc
    mode: "0644"

- name: Dearmor neovim PPA signing key
  become: true
  ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/neovim-ppa.gpg /usr/share/keyrings/neovim-ppa.asc
  args:
    creates: /usr/share/keyrings/neovim-ppa.gpg

- name: Add neovim PPA repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/neovim-ppa.gpg] https://ppa.launchpadcontent.net/neovim-ppa/unstable/ubuntu {{ ansible_distribution_release }} main"
    filename: neovim-ppa
    state: present

- name: Install neovim
  become: true
  ansible.builtin.apt:
    name: neovim
    state: present
    update_cache: true

- name: Create ~/.local/share/fonts directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    recurse: true

- name: Download Nerd Fonts (dejavu-sans-mono-nerdfonts)
  become: false
  ansible.builtin.unarchive:
    src: https://github.com/ryanoasis/nerd-fonts/releases/download/v2.1.0/DejaVuSansMono.zip
    dest: ~/.local/share/fonts
    remote_src: true
    creates: '~/.local/share/fonts/DejaVu Sans Mono Nerd Font Complete Mono.ttf'
  notify: Fc-cache
