---
- name: Check for Steam Deck
  ansible.builtin.stat:
    path: /etc/steamos-release
  register: steamos_release

- name: Set is_steamdeck fact
  ansible.builtin.set_fact:
    is_steamdeck: "{{ steamos_release.stat.exists }}"

- name: Include OS specific tasks
  ansible.builtin.include_tasks: "{{ 'steamdeck' if is_steamdeck else ansible_os_family | lower }}.yml"

- name: Create ~/.local/share/fonts directory
  become: false
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    recurse: true

- name: Download Nerd Fonts (dejavu-sans-mono-nerdfonts)
  become: false
  ansible.builtin.unarchive:
    src: https://github.com/ryanoasis/nerd-fonts/releases/download/v2.1.0/DejaVuSansMono.zip
    dest: ~/.local/share/fonts
    remote_src: true
    creates: '~/.local/share/fonts/DejaVu Sans Mono Nerd Font Complete Mono.ttf'
  notify: Fc-cache

- name: Install neovim
  become: true
  ansible.builtin.package:
    name: neovim
    state: present
  when: ansible_os_family == 'Archlinux' and not is_steamdeck

- name: Create ~/.config/nvim directories
  become: false
  ansible.builtin.file:
    path: "~/.config/{{ item }}"
    state: directory
    mode: "0755"
    recurse: true
  loop:
    - "nvim/lua/conf/plugins"

- name: Generate nvim config files
  become: false
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "~/.config/nvim/{{ item }}"
    mode: "0755"
  loop:
    - init.lua
    - lua/conf/utils.lua
    - lua/conf/plugins.lua
    - lua/conf/remap.lua
    - lua/conf/set.lua
    - lua/conf/plugins/colors.lua
    - lua/conf/plugins/filetype.lua
    - lua/conf/plugins/lsp.lua
    - lua/conf/plugins/nvimtree.lua
    - lua/conf/plugins/telescope.lua
    - lua/conf/plugins/test.lua
