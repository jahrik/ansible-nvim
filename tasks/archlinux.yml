---
- name: Update pacman cache
  become: true
  community.general.pacman:
    update_cache: true
  changed_when: false

- name: Install requirements
  become: true
  community.general.pacman:
    name:
      - fd
      - fontconfig
      - neovim
      - ripgrep
      - tree-sitter-cli
      - unzip
    state: present
