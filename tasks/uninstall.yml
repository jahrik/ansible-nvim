---
- name: Uninstall neovim (macOS)
  become: false
  community.general.homebrew:
    name: neovim
    state: absent
  when: ansible_os_family == 'Darwin'

- name: Uninstall neovim
  become: true
  ansible.builtin.package:
    name: neovim
    state: absent
  when: ansible_os_family != 'Darwin'

- name: Destroy ~/.config/nvim directory
  become: false
  ansible.builtin.file:
    path: ~/.config/nvim
    state: absent
