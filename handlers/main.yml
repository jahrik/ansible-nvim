---
- name: Nvim packersync
  become: false
  ansible.builtin.command: timeout 60 nvim --headless -c 'autocmd User PackerComplete quitall' -c 'PackerSync'
  changed_when: true
  failed_when: false

- name: Fc-cache
  become: false
  ansible.builtin.command: fc-cache -f ~/.local/share/fonts/
  changed_when: true
  failed_when: false
